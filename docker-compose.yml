services:
  postgres:
    image: postgres:16-alpine
    container_name: store-rating-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-store_rating}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-store_rating_secret}
      POSTGRES_DB: ${POSTGRES_DB:-store_rating_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-store_rating} -d ${POSTGRES_DB:-store_rating_db}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
